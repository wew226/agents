product_architect_task:
  description: >
    Given a high-level product idea, generate a complete software specification.

    The output must include:
    1. A detailed requirements specification
    2. A Python module name (snake_case, ending in .py)
    3. A primary class name (PascalCase)

    The requirements should:
    - Be clear, complete, and implementation-ready
    - Cover core functionality, constraints, and edge cases
    - Include validation rules and system behavior

    Naming rules:
    - Module name must be descriptive and not generic (avoid names like system.py or manager.py)
    - Class name must represent the main domain entity

    Product idea:
    {idea}

  expected_output: >
    A single JSON object with exactly three string keys: "requirements" (full specification text),
    "module_name" (snake_case filename ending in .py), and "class_name" (PascalCase).
    Example shape: {"requirements": "...", "module_name": "example.py", "class_name": "Example"}.

  agent: product_architect
  output_file: output/spec.txt

design_task:
  description: >
    Using the product architect task output in context (requirements text, module_name, class_name),
    prepare a detailed design for the engineer. Everything should be in one python module; outline
    the classes and methods in the module.

    IMPORTANT: Only output the design in markdown format, laying out in detail the classes and functions
    in the module, describing the functionality.
  expected_output: >
    A detailed design for the engineer, identifying the classes and functions in the module.
  agent: engineering_lead
  context:
    - product_architect_task
  output_file: output/design.md

code_task:
  description: >
    Write a python module that implements the design from the engineering lead task in context,
    satisfying the requirements from the product architect output in context.
  expected_output: >
    A python module that implements the design and achieves the requirements.
    IMPORTANT: Output ONLY the raw Python code without any markdown formatting, code block delimiters, or backticks.
    The output should be valid Python code that can be directly saved to a file and executed.
    Name the file to match module_name from the product architect output (e.g. my_feature.py).
  agent: backend_engineer
  context:
    - design_task
    - product_architect_task
  output_file: output/backend.py

frontend_task:
  description: >
    Write a gradio UI in app.py that demonstrates the backend class. Use module_name and class_name from
    the product architect output in context. Assume there is only 1 user; keep the UI very simple.
  expected_output: >
    A gradio UI in module app.py that demonstrates the given backend class.
    The file should be ready so that it can be run as-is alongside the backend module, importing the
    main class from the module file name in context.
    IMPORTANT: Output ONLY the raw Python code without any markdown formatting, code block delimiters, or backticks.
    The output should be valid Python code that can be directly saved to a file and executed.
  agent: frontend_engineer
  context:
    - code_task
    - product_architect_task
  output_file: output/app.py

test_task:
  description: >
    Write unit tests for the backend module from context, using module_name from the product architect output.
  expected_output: >
    A test module that tests the given backend module.
    IMPORTANT: Output ONLY the raw Python code without any markdown formatting, code block delimiters, or backticks.
    The output should be valid Python code that can be directly saved to a file and executed.
  agent: test_engineer
  context:
    - code_task
    - product_architect_task
  output_file: output/test_backend.py
